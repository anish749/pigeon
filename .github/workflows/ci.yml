name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
