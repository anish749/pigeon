display_information:
  name: Anish's Pigeon
  description: Carrier pigeon. Picks up messages, flies them to Anish. No pecking, no replies.
  long_description: >-
    Coo! This is Anish's personal carrier pigeon. It picks up
    messages and flies them home so Anish can catch up whenever
    he likes. Quiet, reliable, never makes a fuss. Won't peck
    at your threads or leave droppings in your channels. Just a
    well-behaved bird doing its one job: carrying messages.
  background_color: "#2d2d2d"

features:
  bot_user:
    display_name: Anish's Pigeon
    always_online: true

oauth_config:
  redirect_urls:
    - http://localhost:9876/slack/oauth/callback
  scopes:
    user:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - users:read
    bot:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - users:read

settings:
  event_subscriptions:
    user_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_hosted: false
