display_information:
  name: "${USERNAME}'s ${WORKSPACE_NAME} Pigeon"
  description: Carrier pigeon. Picks up messages, flies them to ${USERNAME}. No pecking, no replies.
  long_description: >-
    Coo! This is ${USERNAME}'s personal carrier pigeon for the
    ${WORKSPACE_NAME} workspace. It picks up messages and flies
    them home so ${USERNAME} can catch up whenever they like.
    Quiet, reliable, never makes a fuss. Won't peck at your
    threads or leave droppings in your channels. Just a
    well-behaved bird doing its one job: carrying messages.
  background_color: "#2d2d2d"

features:
  app_home:
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: "${USERNAME}'s ${WORKSPACE_NAME} Pigeon"
    always_online: true

oauth_config:
  redirect_urls:
    - http://localhost:9876/slack/oauth/callback
  scopes:
    user:
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - mpim:write
      - search:read
      - users:read
      - users:read.email
    bot:
      - channels:history
      - channels:read
      - chat:write
      - chat:write.public
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - mpim:write
      - reactions:read
      - reactions:write
      - users:read
      - users:read.email

settings:
  event_subscriptions:
    user_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
    bot_events:
      - member_joined_channel
      - member_left_channel
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - reaction_added
      - reaction_removed
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_hosted: false
