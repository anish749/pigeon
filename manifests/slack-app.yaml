display_information:
  name: "${USERNAME}'s Pigeon (${WORKSPACE_NAME})"
  description: Carrier pigeon. Picks up messages, flies them to ${USERNAME}. No pecking, no replies.
  long_description: >-
    Coo! This is ${USERNAME}'s personal carrier pigeon for the
    ${WORKSPACE_NAME} workspace. It picks up messages and flies
    them home so ${USERNAME} can catch up whenever they like.
    Quiet, reliable, never makes a fuss. Won't peck at your
    threads or leave droppings in your channels. Just a
    well-behaved bird doing its one job: carrying messages.
  background_color: "#2d2d2d"

features:
  bot_user:
    display_name: "${USERNAME}'s Pigeon (${WORKSPACE_NAME})"
    always_online: true

oauth_config:
  redirect_urls:
    - http://localhost:9876/slack/oauth/callback
  scopes:
    user:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - users:read
    bot:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - users:read

settings:
  event_subscriptions:
    user_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
    bot_events:
      - member_joined_channel
      - member_left_channel
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_hosted: false
